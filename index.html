<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d0d;
      color: #f0a500;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
    }
    .container {
      text-align: center;
      padding: clamp(16px, 4vw, 36px) clamp(20px, 6vw, 48px);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      background: #141414;
      box-shadow: 0 0 40px rgba(240,165,0,0.08);
      width: 100%;
      max-width: 420px;
      display: inline-block;
    }
    .title {
      font-size: clamp(13px, 3vw, 20px);
      font-weight: 600;
      margin-bottom: clamp(10px, 2vw, 20px);
      color: #f0a500;
      letter-spacing: 0.5px;
    }
    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(6px, 2vw, 14px);
      margin-bottom: clamp(8px, 2vw, 16px);
    }
    .time-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: clamp(6px, 2vw, 10px) clamp(8px, 2.5vw, 14px);
      min-width: clamp(40px, 10vw, 60px);
    }
    .time-unit .val {
      font-size: clamp(22px, 6vw, 40px);
      font-weight: bold;
      color: #ffffff;
      line-height: 1;
    }
    .time-unit .lbl {
      font-size: clamp(9px, 1.8vw, 12px);
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .blocks {
      font-size: clamp(11px, 2.5vw, 15px);
      color: #aaaaaa;
      margin-top: clamp(4px, 1vw, 8px);
    }
    .blocks span {
      color: #f0a500;
      font-weight: 600;
    }
    .halving-block {
      margin-top: clamp(6px, 1.5vw, 14px);
      font-size: clamp(11px, 2vw, 13px);
      color: #555;
    }
    .halving-block span {
      color: #888;
    }
    .status {
      margin-top: clamp(6px, 1.5vw, 12px);
      font-size: clamp(10px, 1.8vw, 12px);
      color: #444;
    }
    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">⛏️ Bitcoin Halving Countdown</div>
    <div class="countdown" id="countdown">
      <div class="time-unit"><span class="val" id="cd-d">--</span><span class="lbl">days</span></div>
      <div class="time-unit"><span class="val" id="cd-h">--</span><span class="lbl">hrs</span></div>
      <div class="time-unit"><span class="val" id="cd-m">--</span><span class="lbl">min</span></div>
      <div class="time-unit"><span class="val" id="cd-s">--</span><span class="lbl">sec</span></div>
    </div>
    <div class="blocks" id="blocks"></div>
    <div class="halving-block">
      Next Halving Block: <span id="halvingBlock">—</span>
    </div>
    <div class="status">
      <span class="dot"></span><span id="statusText">Fetching data...</span>
    </div>
  </div>

  <script>
    const halvingInterval = 210000;
    let countdownTimer = null;
    let remainingSeconds = 0;

    function fetchWithTimeout(url, timeout = 5000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
    }

    // Try all APIs in parallel, return first successful result
    async function fetchCurrentBlock() {
      const attempts = [
        fetchWithTimeout('https://mempool.space/api/blocks/tip/height')
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(t => { const n = parseInt(t, 10); if (isNaN(n) || n <= 0) throw new Error(); return n; }),
        fetchWithTimeout('https://blockstream.info/api/blocks/tip/height')
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(t => { const n = parseInt(t, 10); if (isNaN(n) || n <= 0) throw new Error(); return n; }),
        fetchWithTimeout('https://api.blockcypher.com/v1/btc/main')
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(j => { if (!j.height || j.height <= 0) throw new Error(); return j.height; })
      ];

      return Promise.any(attempts).catch(() => { throw new Error('All APIs failed'); });
    }

    function startCountdown() {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        if (remainingSeconds > 0) remainingSeconds--;
        const d = Math.floor(remainingSeconds / 86400);
        const h = Math.floor((remainingSeconds % 86400) / 3600);
        const m = Math.floor((remainingSeconds % 3600) / 60);
        const s = remainingSeconds % 60;
        document.getElementById('cd-d').textContent = d;
        document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
        document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
        document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
      }, 1000);
    }

    async function updateHalvingData() {
      document.getElementById('statusText').textContent = 'Fetching...';
      try {
        const currentBlock = await fetchCurrentBlock();
        const nextHalving = Math.ceil((currentBlock + 1) / halvingInterval) * halvingInterval;
        const blocksRemaining = nextHalving - currentBlock;

        remainingSeconds = blocksRemaining * 10 * 60;

        document.getElementById('halvingBlock').textContent = nextHalving.toLocaleString();
        document.getElementById('blocks').innerHTML =
          `Current block: <span>${currentBlock.toLocaleString()}</span> &nbsp;|&nbsp; Remaining: <span>${blocksRemaining.toLocaleString()}</span>`;

        const now = new Date().toLocaleTimeString();
        document.getElementById('statusText').textContent = `Live · updated ${now}`;

        startCountdown();
      } catch (e) {
        document.getElementById('cd-d').textContent = '--';
        document.getElementById('cd-h').textContent = '--';
        document.getElementById('cd-m').textContent = '--';
        document.getElementById('cd-s').textContent = '--';
        document.getElementById('statusText').textContent = `Error: ${e.message}`;
      }
    }

    updateHalvingData();
    setInterval(updateHalvingData, 60000);
  </script>
</body>
</html>
